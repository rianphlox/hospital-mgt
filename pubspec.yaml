name: crownlog_flutter
description: "CrownLog Hospital Management System - A comprehensive Flutter-based solution for healthcare facilities featuring patient management, treatment tracking, billing, and partial payment processing with Firebase integration."

# Repository and homepage information
homepage: https://github.com/rianphlox/hospital-mgt
repository: https://github.com/rianphlox/hospital-mgt

# Prevent accidental publishing to pub.dev
publish_to: 'none'

# Version: Major.Minor.Patch+BuildNumber
# Increment for each release with new features or bug fixes
version: 1.0.0+1

# Supported Dart SDK version
environment:
  sdk: ^3.9.2

# Production dependencies
dependencies:
  flutter:
    sdk: flutter

  # Firebase Backend Services
  firebase_core: ^3.6.0          # Core Firebase functionality
  firebase_auth: ^5.3.1          # User authentication and authorization
  cloud_firestore: ^5.4.3        # NoSQL real-time database
  firebase_messaging: ^15.1.3    # Push notifications and real-time messaging

  # State Management & Architecture
  provider: ^6.1.2               # Reactive state management pattern

  # UI Components & Icons
  cupertino_icons: ^1.0.8        # iOS-style icons
  material_design_icons_flutter: ^7.0.7296  # Material Design icon set

  # Internationalization & Formatting
  intl: ^0.20.1                  # Currency formatting and date/time utilities

  # Document Generation & File Management
  pdf: ^3.11.1                   # Professional PDF receipt generation
  path_provider: ^2.1.5          # File system path access
  permission_handler: ^11.3.1    # Android/iOS storage permissions
  share_plus: ^10.1.2            # Cross-platform file sharing
  # downloads_path_provider_28: ^0.1.2  # Replaced due to namespace compatibility issues

  # Notifications & Alerts
  flutter_local_notifications: ^18.0.1  # Local notification scheduling

  # Security & Privacy
  screen_protector: ^1.4.2       # Screenshot and screen recording protection
  local_auth: ^2.2.0            # Biometric authentication (fingerprint, face ID)
  flutter_secure_storage: ^9.2.2 # Encrypted local storage for sensitive data

  # Utilities & Helpers
  uuid: ^4.5.1                   # Unique identifier generation

# Development dependencies (not included in production build)
dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Quality & Linting
  flutter_lints: ^5.0.0          # Dart/Flutter best practices and style guide

# Flutter-specific configuration
flutter:
  # Enable Material Design components and icons
  uses-material-design: true

  # Application assets (images, fonts, etc.)
  assets:
    - assets/images/              # Hospital logos and UI assets
    - assets/fonts/               # Custom fonts for PDF generation

  # Custom fonts can be added here for branding
  # fonts:
  #   - family: HospitalFont
  #     fonts:
  #       - asset: fonts/HospitalFont-Regular.ttf
  #       - asset: fonts/HospitalFont-Bold.ttf
  #         weight: 700
